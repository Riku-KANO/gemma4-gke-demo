apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-small
  labels:
    app: gemma-small
    role: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma-small
  template:
    metadata:
      labels:
        app: gemma-small
        role: orchestrator
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.19.1-ubuntu2404
          imagePullPolicy: IfNotPresent
          args:
            - --model=$(MODEL_ID)
            - --served-model-name=$(MODEL_ID)
            - --host=0.0.0.0
            - --port=8000
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
            - --max-model-len=8192
            - --gpu-memory-utilization=0.90
          env:
            - name: MODEL_ID
              value: "__MODEL_ID_SMALL__"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_api_token
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 300
            periodSeconds: 10
            failureThreshold: 60
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
            - { name: model-cache, mountPath: /root/.cache/huggingface }
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: model-cache
          emptyDir: { sizeLimit: 50Gi }
