# SMALL-model pool: EPP + InferencePool + HTTPRoute + GCP policies.
#
# The HTTPRoute matches on header X-Gateway-Base-Model-Name
# (set by BBR — see manifests/gateway/bbr.yaml). Scripts patch
# __MODEL_ID_SMALL__ to the value from .env at apply time.
#
# Regenerate with:
#   helm template gemma-small \
#     oci://us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/charts/inferencepool \
#     --version v0 --set provider.name=gke \
#     --set inferencePool.modelServers.matchLabels.app=gemma-small \
#     --set experimentalHttpRoute.enabled=true \
#     --set experimentalHttpRoute.baseModel=__MODEL_ID_SMALL__
# Then `sed -i 's/name: inference-gateway$/name: inference-gw/'` on the output.
---
# Source: inferencepool/templates/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gemma-small-epp
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
---
# Source: inferencepool/templates/inferenceextension.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: gemma-small-epp
  namespace: default
data:
  default-plugins.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: "http"
        path: "/metrics"
        insecureSkipVerify: true
    - type: core-metrics-extractor
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
---
# Source: inferencepool/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gemma-small-epp-non-sa
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
rules:
- apiGroups: ["inference.networking.x-k8s.io"]
  resources: ["inferenceobjectives", "inferencemodelrewrites"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "watch", "list"]
---
# Source: inferencepool/templates/rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gemma-small-epp-sa
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
# Source: inferencepool/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gemma-small-epp-non-sa
  namespace: default
subjects:
- kind: ServiceAccount
  name: gemma-small-epp
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gemma-small-epp-non-sa
---
# Source: inferencepool/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gemma-small-epp-sa
  namespace: default
subjects:
- kind: ServiceAccount
  name: gemma-small-epp
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gemma-small-epp-sa
---
# Source: inferencepool/templates/inferenceextension.yaml
apiVersion: v1
kind: Service
metadata:
  name: gemma-small-epp
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
spec:
  selector:
    inferencepool: gemma-small-epp
  ports:
    - name: grpc-ext-proc
      protocol: TCP
      port: 9002
    - name: http-metrics
      protocol: TCP
      port: 9090
  type: ClusterIP
---
# Source: inferencepool/templates/inferenceextension.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-small-epp
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
    inference.networking.k8s.io/igw-mode: inferencepool
spec:
  replicas: 1
  strategy:
    # The current recommended EPP deployment pattern is to have a single active replica. This ensures
    # optimal performance of the stateful operations such prefix cache aware scorer.
    # The Recreate strategy the old replica is killed immediately, and allow the new replica(s) to
    # quickly take over. This is particularly important in the high availability set up with leader
    # election, as the rolling update strategy would prevent the old leader being killed because
    # otherwise the maxUnavailable would be 100%.
    type: Recreate
  selector:
    matchLabels:
      inferencepool: gemma-small-epp
  template:
    metadata:
      labels:
        inferencepool: gemma-small-epp
        inference.networking.k8s.io/igw-mode: inferencepool
    spec:
      serviceAccountName: gemma-small-epp
      # Conservatively, this timeout should mirror the longest grace period of the pods within the pool
      terminationGracePeriodSeconds: 130
      containers:
        - name: epp
          image: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/epp:main
          imagePullPolicy: Always
          args:
              - --pool-name
              - gemma-small
              # The pool namespace is optional because EPP can default to the NAMESPACE env var.
              - --pool-namespace
              - default
              - --pool-group
              - "inference.networking.k8s.io"
          # Legacy metric CLI flags (skipped when dataLayer is enabled via latency predictor).
              - --zap-encoder
              - "json"
              - --config-file
              - "/config/default-plugins.yaml"
              # Pass additional flags via the inferenceExtension.flags field in values.yaml.
              - --v
              - "1"
              - --tracing=false
          resources:
            
            limits:
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 8Gi
          ports:
            - name: grpc
              containerPort: 9002
            - name: grpc-health
              containerPort: 9003
            - name: metrics
              containerPort: 9090
          livenessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9003
              service: inference-extension
            periodSeconds: 2
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            
          volumeMounts:
            - name: plugins-config-volume
              mountPath: "/config"
        
      volumes:
        - name: plugins-config-volume
          configMap:
            name: gemma-small-epp
---
# Source: inferencepool/templates/inferenceextension.yaml
---
---
# Source: inferencepool/templates/gke.yaml
apiVersion: networking.gke.io/v1
kind: GCPBackendPolicy
metadata:
  name: gemma-small
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
spec:
  targetRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: gemma-small
  default:
    timeoutSec: 300    # 5-minute timeout (adjust as needed)
    logging:
      enabled: true    # log all requests by default
---
# Source: inferencepool/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemma-small
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: inference-gw
  rules:
  - backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: gemma-small
    matches:
    - path:
        type: PathPrefix
        value: /
      headers:
        - type: Exact
          name: X-Gateway-Base-Model-Name
          value: __MODEL_ID_SMALL__
---
# Source: inferencepool/templates/gke.yaml
kind: HealthCheckPolicy
apiVersion: networking.gke.io/v1
metadata:
  name: gemma-small
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
spec:
  targetRef:
    group: inference.networking.k8s.io
    kind: InferencePool
    name: gemma-small
  default:
    # Set a more aggressive health check than the default 5s for faster switch
    # over during EPP rollout.
    timeoutSec: 2
    checkIntervalSec: 2
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        port: 8000
---
# Source: inferencepool/templates/inferencepool.yaml
apiVersion: "inference.networking.k8s.io/v1"
kind: InferencePool
metadata:
  name: gemma-small
  namespace: default
  labels:
    app.kubernetes.io/name: gemma-small-epp
    app.kubernetes.io/version: "v0"
spec:
  targetPorts:
      - number: 8000
  appProtocol: "http"
  selector:
    matchLabels:
      app: "gemma-small"
  endpointPickerRef:
    name: gemma-small-epp
    port:
      number: 9002
    failureMode: FailOpen
