# Body-Based Router (BBR) extension for GKE Inference Gateway.
#
# Reads the OpenAI `model` field from the request body and sets
# `X-Gateway-Model-Name` so HTTPRoute can dispatch between pools.
# Wired to the Gateway via a GCPRoutingExtension (GKE-specific).
#
# Regenerate with:
#   helm template body-based-router \
#     oci://us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/charts/body-based-routing \
#     --version v0 --set provider.name=gke
# Then `sed -i 's/name: inference-gateway$/name: inference-gw/'` on the output.
---
# Source: body-based-routing/templates/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: body-based-router-body-based-router
  namespace: default
---
# Source: body-based-routing/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: body-based-router-body-based-router-configmap-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
# Source: body-based-routing/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: body-based-router-body-based-router
  namespace: default
subjects:
- kind: ServiceAccount
  name: body-based-router-body-based-router
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: body-based-router-body-based-router-configmap-reader
---
# Source: body-based-routing/templates/bbr.yaml
apiVersion: v1
kind: Service
metadata:
  name: body-based-router
  namespace: default
spec:
  selector:
    app: body-based-router
  ports:
  - protocol: TCP
    port: 9004
    targetPort: 9004
    appProtocol: HTTP2
  type: ClusterIP
---
# Source: body-based-routing/templates/bbr.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: body-based-router
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: body-based-router
  template:
    metadata:
      labels:
        app: body-based-router
    spec:
      serviceAccountName: body-based-router-body-based-router
      containers:
      - name: bbr
        # Pinned to the v1.5.0 conformance build (same digest as the chart's
        # :main at the v1.5.0 release commit). No plain `v1.5.0` tag exists
        # for BBR — only EPP gets that. Bump together with EPP when upgrading.
        image: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/bbr:v20260418-conformancev1.5.0
        imagePullPolicy: IfNotPresent
        args:
        - "--streaming"
        # Pass additional flags via the bbr.flags field in values.yaml.
        - --v
        - "3"
        - --plugin
        - "body-field-to-header:model-extractor:{\"fieldName\":\"model\",\"headerName\":\"X-Gateway-Model-Name\"}"
        - --plugin
        - "base-model-to-header:base-model-mapper"
        - --tracing=false
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 9004
        # health check
        - containerPort: 9005
---
# Source: body-based-routing/templates/rbac.yaml
## if bbr is set in a single namespace
---
# Source: body-based-routing/templates/gke.yaml
kind: GCPRoutingExtension
apiVersion: networking.gke.io/v1
metadata:
  name: body-based-router
  namespace: default
spec:
  targetRefs:
  - group: "gateway.networking.k8s.io"
    kind: Gateway
    name: inference-gw
  extensionChains:
  - name: chain1
    extensions:
    - name: ext1
      authority: "myext.com"
      timeout: 1s
      supportedEvents:
      - RequestHeaders
      - RequestBody
      - RequestTrailers
      requestBodySendMode: "FullDuplexStreamed"
      backendRef:
        group: ""
        kind: Service
        name: body-based-router
        port: 9004
---
# Source: body-based-routing/templates/gke.yaml
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: bbr-healthcheck
  namespace: default
spec:
  default:
    logConfig:
      enabled: true
    config:
      type: "GRPC"
      grpcHealthCheck:
        portSpecification: "USE_FIXED_PORT"
        port: 9005
  targetRef:
    group: ""
    kind: Service
    name: body-based-router
    namespace: default
