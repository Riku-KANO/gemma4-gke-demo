apiVersion: v1
kind: Service
metadata:
  name: agent
  labels:
    app: agent
spec:
  # ClusterIP (not LoadBalancer) — the agent has no auth and the GPU it talks
  # to is expensive. Do not expose it externally. To reach it from your
  # workstation use `kubectl port-forward svc/agent 8080:80`.
  type: ClusterIP
  selector:
    app: agent
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
